name: Update AI News

on:
  schedule:
    - cron: "0 23 * * *"
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate news.json
        run: node scripts/fetch-ai-news.js
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-5-mini

      - name: Commit updated news
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/news.json data/index.json data/history
          git commit -m "Update AI news" || echo "No changes"
          git push
